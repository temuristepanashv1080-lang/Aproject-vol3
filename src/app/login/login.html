<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🛒</div>
      <h1>Welcome back</h1>
      <p>Sign in to your TechShop account</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" class="auth-form">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" ngModel [(ngModel)]="email" email required placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" ngModel [(ngModel)]="password" required minlength="8" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">Sign In</button>
    </form>

    <div class="auth-footer">
      <a routerLink="/register" class="link">Don't have an account? Register</a>
      <button class="btn-forgot" (click)="fogort()">Forgot password?</button>
    </div>

    @if(forgotShow){
      <div class="forgot-section">
        <app-fogort [email]="email" [changeOrdForgot]="'forgot'"></app-fogort>
      </div>
    }
  </div>
</div>
